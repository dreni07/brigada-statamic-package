title: Page
sections:
  main:
    display: Main
    fields:
      -
        handle: title
        field:
          type: text
          display: Title
          validate:
            - required
      -
        handle: slug
        field:
          type: slug
          display: Slug
          validate:
            - required
      -
        handle: content
        field:
          type: markdown
          display: Content
  seo:
    display: SEO
    fields:
      -
        import: seo
