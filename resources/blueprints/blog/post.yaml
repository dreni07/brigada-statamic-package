title: Post
sections:
  main:
    display: Main
    fields:
      -
        handle: title
        field:
          type: text
          display: Title
          validate:
            - required
      -
        handle: slug
        field:
          type: slug
          display: Slug
          validate:
            - required
      -
        handle: featured_image
        field:
          type: assets
          display: Featured Image
          container: images
          max_files: 1
      -
        handle: content
        field:
          type: markdown
          display: Content
      -
        handle: author
        field:
          type: text
          display: Author
      -
        handle: published_at
        field:
          type: date
          display: Published At
          time_enabled: false
  seo:
    display: SEO
    fields:
      -
        import: seo
