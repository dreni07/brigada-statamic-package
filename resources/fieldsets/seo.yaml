title: SEO
fields:
  -
    handle: seo_title
    field:
      type: text
      display: Meta Title
  -
    handle: seo_description
    field:
      type: textarea
      display: Meta Description
      character_limit: 160
  -
    handle: og_image
    field:
      type: assets
      display: OG Image
      container: images
      max_files: 1
